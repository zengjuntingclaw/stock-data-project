# 数据范围约束配置
# ========================
# 此文件控制整个项目的数据获取范围。
# 修改此文件即可调整股票池和时间范围，无需改代码。
#
# bypass_scope: 设为 true 可临时禁用所有范围检查（用于调试/管理员）
# 正常使用时保持 false

bypass_scope: false

# 允许的股票池（白名单），留空列表 [] 表示不限制股票
# 格式：ts_code 必须带交易所后缀，如 "600036.SH"、"301029.SZ"
allowed_stocks:
  - "600036.SH"   # 招商银行
  - "600519.SH"   # 贵州茅台
  - "600900.SH"   # 长江电力
  - "600941.SH"   # 中国移动
  - "301029.SZ"   # 怡合达

# 数据时间范围约束
# start_date: 数据获取最早日期（留空表示不限制）
# end_date: 数据获取最晚日期（留空表示不限制，默认取当天）
date_range:
  start_date: "2024-04-18"   # 近两年（今日往前推两年）
  end_date: ""              # 空表示自动取当天
